ActionBusinessVaultUpdate.Name=Business Vault Update
ActionBusinessVaultUpdate.Description=Updates a Business Vault by generating and executing build pipelines for tables in a Business Vault model.
ActionBusinessVaultUpdate.Keywords=business vault,update,bv,scd2
ActionBusinessVaultUpdate.Title=Business Vault Update
ActionBusinessVaultUpdate.Name.Label=Action name
ActionBusinessVaultUpdate.Tab.Model.Label=Model
ActionBusinessVaultUpdate.Tab.Model.ToolTip=Business Vault model file, pipeline run configuration, orchestration, and catalog options
ActionBusinessVaultUpdate.Tab.Ddl.Label=DDL
ActionBusinessVaultUpdate.Tab.Ddl.ToolTip=Target database structure creation, DDL file output, and DDL guard options
ActionBusinessVaultUpdate.BusinessVaultModel.Label=Business Vault model file
ActionBusinessVaultUpdate.BusinessVaultModel.ToolTip=The .hbv file containing the Business Vault model to update.
ActionBusinessVaultUpdate.PipelineRunConfiguration.Label=Pipeline run configuration
ActionBusinessVaultUpdate.PipelineRunConfiguration.ToolTip=The pipeline run configuration used when executing generated update pipelines.
ActionBusinessVaultUpdate.LogModelCheckFailures.Label=Log model check failures
ActionBusinessVaultUpdate.LogModelCheckFailures.ToolTip=When enabled, BusinessVaultModel.check() results are written to the action log.
ActionBusinessVaultUpdate.AbortOnModelCheckFailures.Label=Abort on model check failures
ActionBusinessVaultUpdate.AbortOnModelCheckFailures.ToolTip=When enabled, the action aborts immediately when model validation reports errors.
ActionBusinessVaultUpdate.ParallelPipelineCopies.Label=Parallel pipeline copies
ActionBusinessVaultUpdate.ParallelPipelineCopies.ToolTip=Number of Pipeline Executor copies used to run staged update pipelines in parallel (round-robin distribution). Default is 1.
ActionBusinessVaultUpdate.PipelineStagingFolder.Label=Pipeline staging folder
ActionBusinessVaultUpdate.PipelineStagingFolder.ToolTip=Folder where generated update pipelines are staged before execution. When empty, defaults to '${java.io.tmpdir}/bv/<model-name>/'.
ActionBusinessVaultUpdate.MetricsOutputFolder.Label=Metrics output folder
ActionBusinessVaultUpdate.MetricsOutputFolder.ToolTip=Optional folder where update metrics are written as JSON after the orchestrator pipeline finishes. When empty, metrics are only logged.
ActionBusinessVaultUpdate.PublishToCatalog.Label=Update data catalog
ActionBusinessVaultUpdate.PublishToCatalog.ToolTip=Upsert record definitions for each Business Vault target table into the configured data catalog. Runs even when the target database data update is skipped.
ActionBusinessVaultUpdate.DataCatalogConnection.Label=Data catalog connection
ActionBusinessVaultUpdate.DataCatalogConnection.ToolTip=The data catalog metadata connection to publish record definitions to (requires Update data catalog).
ActionBusinessVaultUpdate.SelectedTableNames.Label=Selected table names
ActionBusinessVaultUpdate.SelectedTableNames.ToolTip=Optional comma-separated list of Business Vault table names to update. When empty, all tables are processed.
ActionBusinessVaultUpdate.DoNotUpdateTargetDatabase.Label=Do not update target database
ActionBusinessVaultUpdate.DoNotUpdateTargetDatabase.ToolTip=When enabled, the action skips running the generated data load pipelines. DDL generation, storage, and execution (if configured) still run.
ActionBusinessVaultUpdate.UpdateTargetStructure.Label=Update target database structure
ActionBusinessVaultUpdate.UpdateTargetStructure.ToolTip=When enabled (default), the action generates and executes CREATE TABLE DDL on the Business Vault target database before running update pipelines.
ActionBusinessVaultUpdate.DdlSqlFilename.Label=DDL SQL filename
ActionBusinessVaultUpdate.DdlSqlFilename.ToolTip=Optional path to a SQL file where generated DDL is written when schema changes are needed.
ActionBusinessVaultUpdate.FailIfDdlNeeded.Label=Fail if DDL is needed
ActionBusinessVaultUpdate.FailIfDdlNeeded.ToolTip=When enabled, the action fails immediately if any DDL would be required to update the target database structure.
ActionBusinessVaultUpdate.ReferencedObject.Description=Open the referenced Business Vault model
ActionBusinessVaultUpdate.Error.NoRunConfig=No pipeline run configuration was specified.
ActionBusinessVaultUpdate.Error.NoModelFile=No Business Vault model file was specified.
ActionBusinessVaultUpdate.Error.NoDataCatalogConnection=Publish to data catalog is enabled but no data catalog connection was specified.
ActionBusinessVaultUpdate.Error.CatalogPublishFailed=Failed to publish record definitions to the data catalog.
ActionBusinessVaultUpdate.Error.General=Error while updating Business Vault
ActionBusinessVaultUpdate.Error.DdlGenerateFailed=Failed to generate DDL for Business Vault table ''{0}''.
ActionBusinessVaultUpdate.Error.DdlSaveFailed=Failed to write DDL to file ''{0}''.
ActionBusinessVaultUpdate.Error.DdlExecutionFailed=Failed to execute DDL on target database ''{0}''.
ActionBusinessVaultUpdate.Error.GenerateFailed=Failed to generate update pipeline for Business Vault table ''{0}''.
ActionBusinessVaultUpdate.Error.OrchestratorFailed=One or more staged update pipelines completed with errors.
ActionBusinessVaultUpdate.Error.StagingCleanupFailed=Failed to remove pipeline staging folder ''{0}''.
ActionBusinessVaultUpdate.Log.ModelCheckResult=Model check: {0} - {1}
ActionBusinessVaultUpdate.Log.AbortingOnModelCheck=Aborting due to model check failures. No update pipelines were executed.
ActionBusinessVaultUpdate.Log.NoTables=No Business Vault tables to update.
ActionBusinessVaultUpdate.Log.AbortingOnDdlNeeded=Aborting because DDL is required to update the target database structure.
ActionBusinessVaultUpdate.Log.DdlSavedToFile=DDL written to file: {0}
ActionBusinessVaultUpdate.Log.SkippingCreateTable=Skipping CREATE TABLE for {0} because the table already exists
ActionBusinessVaultUpdate.Log.ExecutingDdl=Executing DDL on target database: {0}
ActionBusinessVaultUpdate.Log.SkippingDdlExecution=Skipping DDL execution on target database (execution option is disabled).
ActionBusinessVaultUpdate.Log.NoDdlNeeded=No DDL is required for the current model.
ActionBusinessVaultUpdate.Log.AbortingOnDdlFailure=Aborting because DDL generation or execution failed.
ActionBusinessVaultUpdate.Log.SkippingDataUpdate=Skipping data load pipelines (do not update target database option is enabled).
ActionBusinessVaultUpdate.Log.GeneratingForTable=Generating update pipeline for Business Vault table: {0}
ActionBusinessVaultUpdate.Log.SkippingUnsupportedTableType=Skipping Business Vault table ''{0}'' (type {1} is not supported in this release).
ActionBusinessVaultUpdate.Log.SavedGeneratedPipeline=Saved generated pipeline ''{0}'' to {1}
ActionBusinessVaultUpdate.Log.StagingPipelines=Staging {1} generated update pipeline(s) to {0}
ActionBusinessVaultUpdate.Log.ParallelCopies=Running staged pipelines with {0} parallel Pipeline Executor copy/copies
ActionBusinessVaultUpdate.Log.RunningOrchestrator=Running orchestrator pipeline ''{0}'' using run configuration: {1}
ActionBusinessVaultUpdate.Log.StagingCleanup=Removed pipeline staging folder {0}
ActionBusinessVaultUpdate.Log.CatalogPublished=Published {0} BV table record definitions to data catalog ''{1}'' ({2} errors).