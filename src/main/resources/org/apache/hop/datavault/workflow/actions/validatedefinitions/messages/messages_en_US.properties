ActionValidateResourceDefinitions.Name=Validate resource definitions (schema gate)
ActionValidateResourceDefinitions.Description=CI/CD schema gate: compare catalog contracts (optional version tag) to live sources or other versions, write Markdown/HTML reports, and fail by severity
ActionValidateResourceDefinitions.Keywords=resource definition group source validation catalog schema gate version impact report
ActionValidateResourceDefinitions.Title=Validate resource definitions
ActionValidateResourceDefinitions.ActionName.Label=Action name
ActionValidateResourceDefinitions.Group.Label=Resource definition group
ActionValidateResourceDefinitions.Group.ToolTip=Hop metadata group containing DV, BV, and DM models to validate
ActionValidateResourceDefinitions.TargetCatalogVersion.Label=Target catalog version
ActionValidateResourceDefinitions.TargetCatalogVersion.ToolTip=Optional semantic catalog version tag (for example ${TARGET_VERSION} or v2.4.0). Empty uses the working-tree catalog.
ActionValidateResourceDefinitions.CompareMode.Label=Compare mode
ActionValidateResourceDefinitions.CompareMode.ToolTip=LIVE_SOURCE compares the expected contract to physical sources; WORKING_VS_VERSION and VERSION_VS_VERSION are offline
ActionValidateResourceDefinitions.BaselineVersion.Label=Baseline catalog version
ActionValidateResourceDefinitions.BaselineVersion.ToolTip=Expected side for WORKING_VS_VERSION / VERSION_VS_VERSION (or defaults to target version for working-tree compare)
ActionValidateResourceDefinitions.ReportOutputPath.Label=Report output path
ActionValidateResourceDefinitions.ReportOutputPath.ToolTip=Folder (or file path) for Markdown/HTML reports; supports Hop VFS (local, S3, Azure, ...). Empty = log only.
ActionValidateResourceDefinitions.ReportFileBaseName.Label=Report file base name
ActionValidateResourceDefinitions.ReportFileBaseName.ToolTip=Optional base name without extension (defaults to group-schema-validation-timestamp)
ActionValidateResourceDefinitions.ReportFormat.Label=Report format
ActionValidateResourceDefinitions.ReportFormat.ToolTip=MARKDOWN, HTML, or BOTH when a report output path is set
ActionValidateResourceDefinitions.FailureSeverity.Label=Failure severity
ActionValidateResourceDefinitions.FailureSeverity.ToolTip=FAIL_ON_BLOCKING (default), FAIL_ON_WARNINGS, or WARN_ONLY
ActionValidateResourceDefinitions.FailOnWarnings.Label=Fail on warnings (legacy)
ActionValidateResourceDefinitions.FailOnWarnings.ToolTip=Legacy option: when enabled with default failure severity, fails on any issue (prefer Failure severity = FAIL_ON_WARNINGS)
ActionValidateResourceDefinitions.IncludeImpact.Label=Include downstream impact
ActionValidateResourceDefinitions.IncludeImpact.ToolTip=Annotate issues with Source→DV→BV→DM blast radius from the resource definition group models
ActionValidateResourceDefinitions.Error.MissingGroup=Resource definition group is required
ActionValidateResourceDefinitions.Error.WarningsPresent=Validation completed with warnings and fail-on-warnings is enabled
ActionValidateResourceDefinitions.Error.ValidationFailed=Source validation failed
ActionValidateResourceDefinitions.Log.ReportWritten=Schema validation report written to {0}
