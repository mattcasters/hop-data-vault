ActionDimensionalUpdate.Name=Dimensional Update
ActionDimensionalUpdate.Description=Updates a Kimball dimensional warehouse by generating and executing load pipelines from a dimensional model.
ActionDimensionalUpdate.Keywords=dimensional,update,dm,kimball,star schema,scd
ActionDimensionalUpdate.Title=Dimensional Update
ActionDimensionalUpdate.Name.Label=Action name
ActionDimensionalUpdate.Tab.Model.Label=Model
ActionDimensionalUpdate.Tab.Model.ToolTip=Dimensional model file, pipeline run configuration, and orchestration options
ActionDimensionalUpdate.Tab.Ddl.Label=DDL
ActionDimensionalUpdate.Tab.Ddl.ToolTip=Target database structure creation, DDL file output, and DDL guard options
ActionDimensionalUpdate.DimensionalModel.Label=Dimensional model file
ActionDimensionalUpdate.DimensionalModel.ToolTip=The .hdm file containing the dimensional model to update.
ActionDimensionalUpdate.PipelineRunConfiguration.Label=Pipeline run configuration
ActionDimensionalUpdate.PipelineRunConfiguration.ToolTip=The pipeline run configuration used when executing generated update pipelines. When empty, uses the global default from Configuration > Data Vault 2.0, then local.
ActionDimensionalUpdate.WorkflowRunConfiguration.Label=Workflow run configuration
ActionDimensionalUpdate.WorkflowRunConfiguration.ToolTip=The workflow run configuration used when executing the generated bulk-load master workflow in Staging file mode. When empty, uses the global default from Configuration > Data Vault 2.0, then local.
ActionDimensionalUpdate.LogModelCheckFailures.Label=Log model check failures
ActionDimensionalUpdate.LogModelCheckFailures.ToolTip=When enabled, DimensionalModel.check() results are written to the action log.
ActionDimensionalUpdate.AbortOnModelCheckFailures.Label=Abort on model check failures
ActionDimensionalUpdate.AbortOnModelCheckFailures.ToolTip=When enabled, the action aborts immediately when model validation reports errors.
ActionDimensionalUpdate.ParallelPipelineCopies.Label=Parallel pipeline copies
ActionDimensionalUpdate.ParallelPipelineCopies.ToolTip=Number of Pipeline Executor copies used to run staged update pipelines in parallel (round-robin distribution). Default is 1.
ActionDimensionalUpdate.PipelineStagingFolder.Label=Pipeline staging folder
ActionDimensionalUpdate.PipelineStagingFolder.ToolTip=Folder where generated update pipelines are staged before execution. When empty, defaults to '${java.io.tmpdir}/dm/<model-name>/'.
ActionDimensionalUpdate.MetricsOutputFolder.Label=Metrics output folder
ActionDimensionalUpdate.MetricsOutputFolder.ToolTip=Optional folder where update metrics are written as JSON after the orchestrator pipeline finishes. When empty, metrics are only logged.
ActionDimensionalUpdate.SelectedTableNames.Label=Selected table names
ActionDimensionalUpdate.SelectedTableNames.ToolTip=Optional comma-separated list of dimensional table names to update. When empty, all tables are processed.
ActionDimensionalUpdate.DoNotUpdateTargetDatabase.Label=Do not update target database
ActionDimensionalUpdate.DoNotUpdateTargetDatabase.ToolTip=When enabled, the action skips running the generated data load pipelines. DDL generation, storage, and execution (if configured) still run.
ActionDimensionalUpdate.UpdateTargetStructure.Label=Update target database structure
ActionDimensionalUpdate.UpdateTargetStructure.ToolTip=When enabled (default), the action generates and executes CREATE TABLE DDL on the dimensional target database before running update pipelines.
ActionDimensionalUpdate.DdlSqlFilename.Label=DDL SQL filename
ActionDimensionalUpdate.DdlSqlFilename.ToolTip=Optional path to a SQL file where generated DDL is written when schema changes are needed.
ActionDimensionalUpdate.FailIfDdlNeeded.Label=Fail if DDL is needed
ActionDimensionalUpdate.FailIfDdlNeeded.ToolTip=When enabled, the action fails immediately if any DDL would be required to update the target database structure.
ActionDimensionalUpdate.ReferencedObject.Description=Open the referenced dimensional model
ActionDimensionalUpdate.Error.NoRunConfig=No pipeline run configuration was specified.
ActionDimensionalUpdate.Error.NoModelFile=No dimensional model file was specified.
ActionDimensionalUpdate.Error.General=Error while updating dimensional warehouse
ActionDimensionalUpdate.Error.DdlGenerateFailed=Failed to generate DDL for dimensional table ''{0}''.
ActionDimensionalUpdate.Error.DdlSaveFailed=Failed to write DDL to file ''{0}''.
ActionDimensionalUpdate.Error.DdlExecutionFailed=Failed to execute DDL on target database ''{0}''.
ActionDimensionalUpdate.Error.GenerateFailed=Failed to generate update pipeline for dimensional table ''{0}''.
ActionDimensionalUpdate.Error.OrchestratorFailed=One or more staged update pipelines completed with errors.
ActionDimensionalUpdate.Error.StagingCleanupFailed=Failed to remove pipeline staging folder ''{0}''.
ActionDimensionalUpdate.Log.ModelCheckResult=Model check: {0} - {1}
ActionDimensionalUpdate.Log.AbortingOnModelCheck=Aborting due to model check failures. No update pipelines were executed.
ActionDimensionalUpdate.Log.NoTables=No dimensional tables to update.
ActionDimensionalUpdate.Log.AbortingOnDdlNeeded=Aborting because DDL is required to update the target database structure.
ActionDimensionalUpdate.Log.DdlSavedToFile=DDL written to file: {0}
ActionDimensionalUpdate.Log.SkippingCreateTable=Skipping CREATE TABLE for {0} because the table already exists
ActionDimensionalUpdate.Log.ExecutingDdl=Executing DDL on target database: {0}
ActionDimensionalUpdate.Log.SkippingDdlExecution=Skipping DDL execution on target database (execution option is disabled).
ActionDimensionalUpdate.Log.NoDdlNeeded=No DDL is required for the current model.
ActionDimensionalUpdate.Log.AbortingOnDdlFailure=Aborting because DDL generation or execution failed.
ActionDimensionalUpdate.Log.SkippingDataUpdate=Skipping data load pipelines (do not update target database option is enabled).
ActionDimensionalUpdate.Log.GeneratingForTable=Generating update pipeline for dimensional table: {0} ({1})
ActionDimensionalUpdate.Log.SavedGeneratedPipeline=Saved generated pipeline ''{0}'' to {1}
ActionDimensionalUpdate.Log.StagingPipelines=Staging {1} generated update pipeline(s) to {0}
ActionDimensionalUpdate.Log.ParallelCopies=Running staged pipelines with {0} parallel Pipeline Executor copy/copies
ActionDimensionalUpdate.Log.RunningOrchestrator=Running orchestrator pipeline ''{0}'' using run configuration: {1}
ActionDimensionalUpdate.Log.StagingCleanup=Removed pipeline staging folder {0}