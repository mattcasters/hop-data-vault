ActionBeginVaultUpdate.Name=Begin Vault Update
ActionBeginVaultUpdate.Description=Starts a correlated DV/BV/DM update run by assigning a workflow execution id
ActionBeginVaultUpdate.Keywords=begin vault update execution id metrics
ActionBeginVaultUpdate.Title=Begin Vault Update
ActionBeginVaultUpdate.ExecutionIdVariable.Label=Workflow execution id variable
ActionBeginVaultUpdate.ExecutionIdVariable.ToolTip=Name of the parent workflow variable that stores the execution id (default DV_WORKFLOW_EXECUTION_ID). The value is assigned automatically on the parent workflow and inherited by child workflows and pipelines.
ActionBeginVaultUpdate.UseWorkflowLogChannelId.Label=Use workflow log channel id
ActionBeginVaultUpdate.UseWorkflowLogChannelId.ToolTip=Use the parent workflow log channel id as the execution id instead of generating a new UUID
ActionBeginVaultUpdate.ReuseExistingExecutionId.Label=Reuse existing execution id
ActionBeginVaultUpdate.ReuseExistingExecutionId.ToolTip=When enabled, keep the current variable value instead of generating a new execution id
ActionBeginVaultUpdate.LogToWorkflow.Label=Log to workflow
ActionBeginVaultUpdate.LogToWorkflow.ToolTip=Write the assigned execution id to the workflow log
ActionBeginVaultUpdate.Log.Started=Vault update run started: {0} (variable {1})
ActionBeginVaultUpdate.Result.Started=Vault update execution id: {0}
ActionBeginVaultUpdate.Error.MissingExecutionId=Unable to assign a workflow execution id
ActionBeginVaultUpdate.Error.MissingWorkflowLogChannelId=Unable to resolve the parent workflow log channel id