ActionEndVaultUpdate.PublishToDatabase.Label=Publish to database
ActionEndVaultUpdate.PublishToDatabase.ToolTip=Insert workflow_load_overview rows into the OPS database
ActionEndVaultUpdate.PublishToCatalog.Label=Publish to catalog
ActionEndVaultUpdate.PublishToCatalog.ToolTip=Upsert workflow overview record definitions in the data catalog
ActionEndVaultUpdate.LogToWorkflow.Label=Log to workflow
ActionEndVaultUpdate.LogToWorkflow.ToolTip=Print the workflow load overview to the workflow log
ActionEndVaultUpdate.WriteMarkdownReport.Label=Write Markdown report
ActionEndVaultUpdate.WriteMarkdownReport.ToolTip=Write a Markdown overview report file
ActionEndVaultUpdate.WriteHtmlReport.Label=Write HTML report
