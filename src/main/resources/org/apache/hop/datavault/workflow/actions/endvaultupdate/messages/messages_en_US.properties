ActionEndVaultUpdate.ExecutionMetricsProfile.Label=Execution metrics profile
ActionEndVaultUpdate.ExecutionMetricsProfile.ToolTip=OPS database and catalog settings used to publish the workflow overview dataset
ActionEndVaultUpdate.DataCatalogConnection.Label=Data catalog connection
