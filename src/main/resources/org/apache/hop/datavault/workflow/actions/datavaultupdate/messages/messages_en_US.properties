#
# Data Vault Update Workflow Action
#

ActionDataVaultUpdate.Name=Data Vault Update
ActionDataVaultUpdate.Description=Updates a Data Vault by generating and executing update pipelines for all tables in a Data Vault model.
ActionDataVaultUpdate.Keywords=data vault,update,dv,datavault
ActionDataVaultUpdate.Title=Data Vault Update
ActionDataVaultUpdate.Name.Label=Action name
ActionDataVaultUpdate.Tab.Model.Label=Model
ActionDataVaultUpdate.Tab.Model.ToolTip=Data Vault model file, pipeline run configuration, and model validation options
ActionDataVaultUpdate.Tab.Ddl.Label=DDL
ActionDataVaultUpdate.Tab.Ddl.ToolTip=Target database structure creation, DDL file output, and DDL guard options
ActionDataVaultUpdate.Tab.Source.Label=Source
ActionDataVaultUpdate.Tab.Source.ToolTip=Record source filtering and data load options
ActionDataVaultUpdate.DataVaultModel.Label=Data Vault Model file
ActionDataVaultUpdate.DataVaultModel.ToolTip=The .hdv file containing the Data Vault model (.hdv) to update.
ActionDataVaultUpdate.PipelineRunConfiguration.Label=Pipeline run configuration
ActionDataVaultUpdate.PipelineRunConfiguration.ToolTip=The name of the pipeline run configuration to use when running the generated update pipelines.
ActionDataVaultUpdate.Error.NoModelFile=No Data Vault Model file was specified.
ActionDataVaultUpdate.Error.NoRunConfig=No Pipeline Run Configuration was specified.
ActionDataVaultUpdate.Log.NoTables=No tables defined in the Data Vault model.
ActionDataVaultUpdate.Log.GeneratingForTable=Generating update pipeline for table: {0}
ActionDataVaultUpdate.Error.GenerateFailed=Failed to generate pipeline for table: {0}
ActionDataVaultUpdate.Log.RunningPipeline=Running update pipeline for table: {0} using run configuration: {1}
ActionDataVaultUpdate.Log.SavedGeneratedPipeline=Saved generated pipeline ''{0}'' to {1}
ActionDataVaultUpdate.Error.PipelineFailed=Pipeline for table {0} completed with errors.
ActionDataVaultUpdate.Error.General=Error while updating Data Vault
ActionDataVaultUpdate.LogModelCheckFailures.Label=Log model check failures
ActionDataVaultUpdate.LogModelCheckFailures.ToolTip=When enabled, DataVaultModel.check() is called and any non-OK check results are logged using logBasic().
ActionDataVaultUpdate.AbortOnModelCheckFailures.Label=Abort on model check failures
ActionDataVaultUpdate.AbortOnModelCheckFailures.ToolTip=When enabled, the model is checked first. Failures are logged and the action aborts immediately without running any update pipelines.
ActionDataVaultUpdate.Log.ModelCheckResult=Model check: {0} - {1}
ActionDataVaultUpdate.Log.AbortingOnModelCheck=Aborting due to model check failures. No update pipelines were executed.
ActionDataVaultUpdate.ReferencedObject.Description=Open the referenced data vault model
ActionDataVaultUpdate.UpdateTargetStructure.Label=Update target database structure
ActionDataVaultUpdate.UpdateTargetStructure.ToolTip=When enabled (default), the action will generate and execute CREATE/ALTER DDL on the target database(s) before running data load pipelines. Disable if you manage target schemas outside of this action (e.g. via migrations or pre-provisioned tables).
ActionDataVaultUpdate.DdlSqlFilename.Label=DDL SQL filename
ActionDataVaultUpdate.DdlSqlFilename.ToolTip=Optional path to a SQL file where generated DDL is written when schema changes are needed. DDL can be stored here without executing it on the target database.
ActionDataVaultUpdate.FailIfDdlNeeded.Label=Fail if DDL is needed
ActionDataVaultUpdate.FailIfDdlNeeded.ToolTip=When enabled, the action fails immediately if any DDL would be required to update the target database structure. Use this to ensure schemas are already up to date before loading data.
ActionDataVaultUpdate.DoNotUpdateTargetDatabase.Label=Do not update target database
ActionDataVaultUpdate.DoNotUpdateTargetDatabase.ToolTip=When enabled, the action skips running the generated data load pipelines. DDL generation, storage, and execution (if configured) still run.
ActionDataVaultUpdate.RecordSourceGroup.Label=Record source group
ActionDataVaultUpdate.RecordSourceGroup.ToolTip=Optional group name to limit the update to record sources tagged with the same group in their Data Vault Source metadata (e.g. hourly, daily). Leave empty to process all record sources.
ActionDataVaultUpdate.EnsureSpecialRecords.Label=Ensure unknown and invalid records
ActionDataVaultUpdate.EnsureSpecialRecords.ToolTip=When enabled, checks each hub and link in the model for unknown and invalid sentinel rows (per Data Vault Configuration) and inserts any missing rows before running load pipelines.
ActionDataVaultUpdate.Log.SpecialRecordsInserted=Inserted {1} special record(s) for table {0}
ActionDataVaultUpdate.Log.SpecialRecordsTotal=Inserted {0} special record(s) in total
ActionDataVaultUpdate.Error.SpecialRecordsFailed=Failed to ensure special records for table: {0}
ActionDataVaultUpdate.Log.UsingRecordSourceGroup=Updating record sources in group: {0}
ActionDataVaultUpdate.Log.SkippingTableForGroup=Skipping table {0}: no record sources in group {1}
ActionDataVaultUpdate.Log.SkippingDdlExecution=Skipping DDL execution on target database(s) (execution option is disabled).
ActionDataVaultUpdate.Log.NoDdlNeeded=No DDL is required for the current model.
ActionDataVaultUpdate.Log.DdlSavedToFile=DDL written to file: {0}
ActionDataVaultUpdate.Log.AbortingOnDdlNeeded=Aborting because DDL is required to update the target database structure.
ActionDataVaultUpdate.Log.SkippingDataUpdate=Skipping data load pipelines (do not update target database option is enabled).
ActionDataVaultUpdate.Log.ExecutingDdl=Executing DDL on target database: {0}
ActionDataVaultUpdate.Error.DdlGenerateFailed=Failed to generate DDL for table: {0}
ActionDataVaultUpdate.Error.DdlExecutionFailed=Failed to execute DDL on target database: {0}
ActionDataVaultUpdate.Error.DdlSaveFailed=Failed to write DDL to file: {0}