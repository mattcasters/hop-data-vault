ActionDimensionalPublish.Name=Dimensional Publish
ActionDimensionalPublish.Description=Publishes a draft Kimball dimensional model (.hdm) from a Data Vault model (.hdv) for review in the dimensional modeler.
ActionDimensionalPublish.Keywords=dimensional,publish,dm,hdv,hdm,kimball,draft
ActionDimensionalPublish.Title=Dimensional Publish
ActionDimensionalPublish.Name.Label=Action name

ActionDimensionalPublish.DataVaultModel.Label=Data Vault model file
ActionDimensionalPublish.DataVaultModel.ToolTip=The .hdv file to publish from.

ActionDimensionalPublish.OutputDimensionalModel.Label=Output dimensional model file
ActionDimensionalPublish.OutputDimensionalModel.ToolTip=The draft .hdm file to create. Review and refine this model before running Dimensional Update.

ActionDimensionalPublish.FailIfOutputExists.Label=Fail if output file exists
ActionDimensionalPublish.FailIfOutputExists.ToolTip=When enabled, the action fails immediately if the output .hdm file already exists.

ActionDimensionalPublish.LogWarnings.Label=Log publish warnings
ActionDimensionalPublish.LogWarnings.ToolTip=When enabled, mapping warnings from the publish adapter are written to the action log.

ActionDimensionalPublish.BridgeForTwoHubLinks.Label=Publish two-hub links as bridges
ActionDimensionalPublish.BridgeForTwoHubLinks.ToolTip=When enabled, links with exactly two hubs and no measures are published as bridge tables instead of factless facts.

ActionDimensionalPublish.ReferencedObject.DvDescription=Open the source Data Vault model
ActionDimensionalPublish.ReferencedObject.DmDescription=Open the published dimensional model

ActionDimensionalPublish.Error.NoDataVaultFile=No Data Vault model file was specified.
ActionDimensionalPublish.Error.NoOutputFile=No output dimensional model file was specified.
ActionDimensionalPublish.Error.OutputExists=Output dimensional model file already exists: {0}
ActionDimensionalPublish.Error.General=Error while publishing dimensional model

ActionDimensionalPublish.Log.Warning=Publish warning: {0}
ActionDimensionalPublish.Log.Published=Published draft dimensional model ''{1}'' from Data Vault model ''{0}'' to {2} ({3} tables, {4} warnings).