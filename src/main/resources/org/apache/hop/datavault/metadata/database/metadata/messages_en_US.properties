#
# Data Vault 2.0 metadata plugin for Apache Hop
# English messages - metadata package
#

# DvDatabaseSource (and common source base)
DvDatabaseSource.DatabaseName.Label=Database connection
DvDatabaseSource.DatabaseName.ToolTip=Name of the registered RDBMS connection (DatabaseMeta) to read data from.
DvDatabaseSource.SchemaName.Label=Schema
DvDatabaseSource.SchemaName.ToolTip=Optional schema name to qualify tables in the source database.
DvDatabaseSource.TableName.Label=Source table / view
DvDatabaseSource.TableName.ToolTip=Optional physical table or view name in the source system (a load process may also receive this at runtime or execute a custom query).
DvSourceBase.Description.Label=Description
DvSourceBase.Description.ToolTip=Description of this source system or data feed.

# DvDatabaseSourceEditor (custom metadata editor)
DvDatabaseSourceEditor.Name.Label=Name
DvDatabaseSourceEditor.Name.ToolTip=The name of this Data Vault source definition.
DvDatabaseSourceEditor.Description.Label=Description
DvDatabaseSourceEditor.Description.ToolTip=Description of this source system / data feed.
DvDatabaseSourceEditor.DatabaseName.Label=Database connection
DvDatabaseSourceEditor.DatabaseName.ToolTip=Name of the RDBMS connection (DatabaseMeta) metadata object to read from.
DvDatabaseSourceEditor.SchemaName.Label=Schema
DvDatabaseSourceEditor.SchemaName.ToolTip=Optional schema name qualifying the source table.
DvDatabaseSourceEditor.TableName.Label=Source table/view
DvDatabaseSourceEditor.TableName.ToolTip=Optional name of the source table or view (may be supplied at runtime instead).
DvDatabaseSourceEditor.Fields.Label=Fields (row layout)
DvDatabaseSourceEditor.Fields.ToolTip=Define the expected columns coming from this source, including which form the natural/primary key on the source side.

DvDatabaseSourceEditor.Import.Button=Import

DvDatabaseSourceEditor.NoConnection.DialogTitle=Error
DvDatabaseSourceEditor.NoConnection.DialogMessage=Please select or enter a database connection name before importing fields from a table.

DvDatabaseSourceEditor.ErrorLoadingConnection.DialogTitle=Error
DvDatabaseSourceEditor.ErrorLoadingConnection.DialogMessage=Error loading the database connection '{0}'.

DvDatabaseSourceEditor.ErrorImportingFields.DialogTitle=Error
DvDatabaseSourceEditor.ErrorImportingFields.DialogMessage=An error occurred while trying to import the fields from the selected database table.
