DvHub.CheckResult.NoBusinessKeys=This hub has no business keys specified.
DvHub.CheckResult.HasBusinessKeys=This hub has {0} business key(s) specified.
DvHub.HashKeyFieldName.Label=Hash key field name
DvHub.HashKeyFieldName.ToolTip=The name of the hash key (surrogate key) column generated for this hub (e.g. CUSTOMER_HK). Used in target table layouts (DDL) and generated update pipelines (Checksum transform result field).
DvHub.RecordSourceFieldName.Label=Record source field name
DvHub.RecordSourceFieldName.ToolTip=Optional name for the record source column specific to this hub (overrides the global Record source field name from the Data Vault Configuration). Supports variables. Used in target table layout and source SQL generation in pipelines.
DvSatellite.CheckResult.NotLinked=This satellite is not linked to a hub or a link.
DvSatellite.CheckResult.LinkedToHub=This satellite is linked to hub ''{0}''.
DvSatellite.CheckResult.LinkedToLink=This satellite is linked to link ''{0}''.
DvLink.CheckResult.NotEnoughHubs=This link is not connected to at least 2 hubs.
DvLink.CheckResult.ConnectedToHubs=This link is connected to {0} hub(s).
