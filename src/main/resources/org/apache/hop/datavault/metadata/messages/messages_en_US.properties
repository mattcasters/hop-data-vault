#
# Data Vault 2.0 metadata plugin for Apache Hop
# English messages - metadata package
#
# Top level metadata types
DataVaultConfiguration.TargetDatabase.Label=Target database
DataVaultConfiguration.TargetDatabase.ToolTip=The target database connection (a DatabaseMeta) where the Data Vault tables (hubs, links, satellites) will be created and loaded.
DvHub.name=Data Vault Hub
DvHub.description=A core business entity (Hub) in a Data Vault 2.0 model. Contains business key definition(s).
DvLink.name=Data Vault Link
DvLink.description=A relationship (Link) between Hubs in a Data Vault 2.0 model.
DvSatellite.name=Data Vault Satellite
DvSatellite.description=Time-variant descriptive attributes (Satellite) attached to a Hub or a Link.
DataVaultModel.name=Data Vault Model
DataVaultModel.description=A collection of Hubs, Links and Satellites that form (part of) a Data Vault 2.0 enterprise data warehouse.
DataVaultSource.name=Data Vault Source
DataVaultSource.description=A record source for a Data Vault model: DV semantics (indicator, group) plus an embedded physical source definition (database table today; file formats later).
# DataVaultConfiguration fields
DataVaultConfiguration.HashAlgorithm.Label=Hash algorithm
DataVaultConfiguration.HashAlgorithm.ToolTip=The hashing algorithm used to compute surrogate hash keys from business keys (and link combinations). MD5 is ubiquitous and fast. SHA-256 offers lower collision risk for very large data sets.
DataVaultConfiguration.HashKeyDataType.Label=Hash key data type
DataVaultConfiguration.HashKeyDataType.ToolTip=STRING (max 64 chars) or HEX (max 32) store the hex representation (easier debugging, more space). BINARY (max 16 bytes) stores the raw hash bytes (recommended: half the storage, better performance, avoids collation problems).
DataVaultConfiguration.HashContentCasing.Label=Hash content casing
DataVaultConfiguration.HashContentCasing.ToolTip=Normalize the case of business key values before hashing to produce consistent keys. UPPER is the most common choice in Data Vault practice.
DataVaultConfiguration.BusinessKeyDelimiter.Label=Business key delimiter
DataVaultConfiguration.BusinessKeyDelimiter.ToolTip=String used to concatenate multiple business key parts (composite keys) and when building the input for link hash keys. Use a value unlikely to appear in your data (e.g. || or | or ~).
DataVaultConfiguration.NullPlaceholder.Label=Null placeholder
DataVaultConfiguration.NullPlaceholder.ToolTip=Value substituted for NULL or missing business key parts during hashing to ensure deterministic and platform-independent results.
DataVaultConfiguration.HashContentPrefix.Label=Hash content prefix
DataVaultConfiguration.HashContentPrefix.ToolTip=Optional text prepended to the concatenated business key content before hashing. Supports variables.
DataVaultConfiguration.HashContentSuffix.Label=Hash content suffix
DataVaultConfiguration.HashContentSuffix.ToolTip=Optional text appended to the concatenated business key content before hashing. Supports variables.
DataVaultConfiguration.TrimBusinessKeys.Label=Trim business keys
DataVaultConfiguration.TrimBusinessKeys.ToolTip=Remove leading and trailing whitespace from business key values before hashing (highly recommended).
DataVaultConfiguration.GenerateUnknownRecord.Label=Generate unknown record
DataVaultConfiguration.GenerateUnknownRecord.ToolTip=Create a special "unknown" / "ghost" record in Hubs (and corresponding entries in Links) for missing or unmapped business keys.
DataVaultConfiguration.UnknownBusinessKeyValue.Label=Unknown business key value
DataVaultConfiguration.UnknownBusinessKeyValue.ToolTip=The business key value stored in hub sentinel rows for "unknown" keys. Also used to compute the hub hash when Unknown hash key value is empty.
DataVaultConfiguration.UnknownHashKeyValue.Label=Unknown hash key value
DataVaultConfiguration.UnknownHashKeyValue.ToolTip=Optional hash key for unknown hub rows. Supports variables and Hop hexadecimal expressions (e.g. $[00] or a continuous MD5 hex string). When empty, the hash is computed from Unknown business key value.
DataVaultConfiguration.UnknownLinkHashKeyValue.Label=Unknown link hash key value
DataVaultConfiguration.UnknownLinkHashKeyValue.ToolTip=Optional hash key for unknown link rows. Supports variables and hexadecimal expressions. When empty, the link hash is computed from the participating hub unknown hash values.
DataVaultConfiguration.UnknownRecordSource.Label=Unknown record source
DataVaultConfiguration.UnknownRecordSource.ToolTip=Record source value written into unknown sentinel rows (default UNKNOWN).
DataVaultConfiguration.GenerateInvalidRecord.Label=Generate invalid record
DataVaultConfiguration.GenerateInvalidRecord.ToolTip=Create a special "invalid" / error record in hubs and links for malformed or rejected business keys.
DataVaultConfiguration.InvalidBusinessKeyValue.Label=Invalid business key value
DataVaultConfiguration.InvalidBusinessKeyValue.ToolTip=The business key value stored in hub sentinel rows for invalid/error keys. Also used to compute the hub hash when Invalid hash key value is empty.
DataVaultConfiguration.InvalidHashKeyValue.Label=Invalid hash key value
DataVaultConfiguration.InvalidHashKeyValue.ToolTip=Optional hash key for invalid hub rows. Supports variables and Hop hexadecimal expressions. When empty, the hash is computed from Invalid business key value.
DataVaultConfiguration.InvalidLinkHashKeyValue.Label=Invalid link hash key value
DataVaultConfiguration.InvalidLinkHashKeyValue.ToolTip=Optional hash key for invalid link rows. Supports variables and hexadecimal expressions. When empty, the link hash is computed from the participating hub invalid hash values.
DataVaultConfiguration.InvalidRecordSource.Label=Invalid record source
DataVaultConfiguration.InvalidRecordSource.ToolTip=Record source value written into invalid sentinel rows (default INVALID).
DataVaultConfiguration.LinkHashKeySuffix.Label=Link hash key suffix
DataVaultConfiguration.LinkHashKeySuffix.ToolTip=Suffix for the link hash key column.
DataVaultConfiguration.LoadDateField.Label=Load date field name
DataVaultConfiguration.LoadDateField.ToolTip=Standard column name for the load timestamp (or datetime) in all DV tables.
DataVaultConfiguration.LoadEndDateField.Label=Load end date field name
DataVaultConfiguration.LoadEndDateField.ToolTip=Column name for the load end timestamp on satellite rows when end-dating is enabled. Open rows keep this value empty.
DataVaultConfiguration.RecordSourceField.Label=Record source field name
DataVaultConfiguration.RecordSourceField.ToolTip=Column that identifies the original source system / feed that produced the record.
DataVaultConfiguration.RecordSourceFieldLength.Label=Record source field length
DataVaultConfiguration.RecordSourceFieldLength.ToolTip=The length (in characters) for the record source field (string column) in target tables. Supports variables. Default 100 if not specified or unparseable.
DataVaultConfiguration.SourceField.Label=Source field name
DataVaultConfiguration.SourceField.ToolTip=Optional additional source identifier column.
DataVaultConfiguration.UseLoadEndDate.Label=Use load end date pattern
DataVaultConfiguration.UseLoadEndDate.ToolTip=Use an end-dating / current flag pattern in satellites (some teams prefer this over pure hashdiff insert-only).
DataVaultConfiguration.TargetTableBatchSize.Label=Target table batch size
DataVaultConfiguration.TargetTableBatchSize.ToolTip=Number of rows to buffer before committing inserts to the target database in generated Table Output transforms (commit size). Supports variables. Default 1000 if empty.
DataVaultConfiguration.GeneratedPipelineFolder.Label=Generated pipeline folder
DataVaultConfiguration.GeneratedPipelineFolder.ToolTip=When set, each generated DV update pipeline is saved as a .hpl file in this folder before execution. Supports variables (e.g. '${PROJECT_HOME}/generated-pipelines'). Leave empty to run in memory only.
DataVaultConfiguration.HubPipelineNamePrefix.Label=Hub pipeline name prefix
DataVaultConfiguration.HubPipelineNamePrefix.ToolTip=Prefix for generated hub update pipeline names (default hub-). The full name is prefix + target table name + - + source name. Supports variables.
DataVaultConfiguration.LinkPipelineNamePrefix.Label=Link pipeline name prefix
DataVaultConfiguration.LinkPipelineNamePrefix.ToolTip=Prefix for generated link update pipeline names (default link-). The full name is prefix + target table name + - + source name. Supports variables.
DataVaultConfiguration.SatellitePipelineNamePrefix.Label=Satellite pipeline name prefix
DataVaultConfiguration.SatellitePipelineNamePrefix.ToolTip=Prefix for generated satellite update pipeline names (default sat-). The full name is prefix + target table name + - + source name. Supports variables.

DataVaultSourceEditor.Name.Label=Data Vault Source name
DataVaultSourceEditor.Tab.General.Label=General
DataVaultSourceEditor.Tab.General.ToolTip=Record source indicator, group and other DV semantics.
DataVaultSourceEditor.Tab.Database.Label=Database
DataVaultSourceEditor.Tab.Database.ToolTip=Database connection, table and field layout for this record source.
# DvHub
DvHub.TableName.Label=Physical table name
DvHub.TableName.ToolTip=The actual table name to be created/used in the target database (can differ from the logical metadata name).
DvHub.Description.Label=Description
DvHub.Description.ToolTip=Business description of this hub.
DvHub.RecordSource.Label=Default record source
DvHub.RecordSource.ToolTip=Default value for the record source column when loading this hub (can be overridden at load time).
DvHub.BusinessKeys.Label=Business keys
DvHub.BusinessKeys.ToolTip=One or more business key columns that uniquely identify instances of this business concept. Order is significant for composite key hashing.
DvHub.Configuration.Label=Configuration
DvHub.Configuration.ToolTip=Specific Data Vault configuration to use for hashing and naming when loading this hub (optional).
# DvLink
DvLink.TableName.Label=Physical table name
DvLink.TableName.ToolTip=The actual table name for the link.
DvLink.Description.Label=Description
DvLink.Description.ToolTip=Description of the relationship this link represents.
DvLink.RecordSource.Label=Default record source
DvLink.RecordSource.ToolTip=Default record source for this link.
DvLink.HubNames.Label=Participating hubs
DvLink.HubNames.ToolTip=List of hub metadata names that participate in this relationship. The link hash key is derived from the hash keys of these hubs (plus driving keys if any).
DvLink.DrivingKeyNames.Label=Driving keys
DvLink.DrivingKeyNames.ToolTip=When the same hub participates multiple times, list the driving key column names that differentiate the roles (e.g. FROM_LOCATION_HK vs TO_LOCATION_HK).
DvLink.LinkHashKeyFieldName.Label=Link hash key field name
DvLink.LinkHashKeyFieldName.ToolTip=Optional name for the surrogate hash key column in this link table. Defaults to the link name + "_LK" if left empty.
DvLink.Configuration.Label=Configuration
DvLink.Configuration.ToolTip=Specific configuration for this link.
DvLink.HasDescriptiveAttributes.Label=Has descriptive attributes (link satellite)
DvLink.HasDescriptiveAttributes.ToolTip=Check if relationship attributes exist that should be historized in a satellite attached to this link.
DvLink.RecordSourceFieldName.Label=Record source field name
DvLink.RecordSourceFieldName.ToolTip=Optional name for the record source column specific to this link (overrides the global Record source field name from the Data Vault Configuration). Supports variables. Used in target table layout and source SQL generation in pipelines.

# DvSatellite
DvSatellite.TableName.Label=Physical table name
DvSatellite.TableName.ToolTip=The actual table name for the satellite.
DvSatellite.Description.Label=Description
DvSatellite.Description.ToolTip=Description of the satellite attributes.
DvSatellite.RecordSource.Label=Default record source
DvSatellite.RecordSource.ToolTip=Default record source.
DvSatellite.HubName.Label=Parent hub
DvSatellite.HubName.ToolTip=Select the hub this satellite is attached to (for hub satellites).
DvSatellite.LinkName.Label=Parent link
DvSatellite.LinkName.ToolTip=Select the link this satellite is attached to (for link satellites). Leave hub empty when using a link.
DvSatellite.Attributes.Label=Attributes
DvSatellite.Attributes.ToolTip=The descriptive columns historized in this satellite.
DvSatellite.Configuration.Label=Configuration
DvSatellite.Configuration.ToolTip=Specific configuration (especially hashdiff and naming).
DvSatellite.DrivingKey.Label=Driving key column
DvSatellite.DrivingKey.ToolTip=Leave empty for a standard satellite. For multi-active satellites (multiple active records per parent at the same time), set the target column name that makes each row unique together with the parent hash key (e.g. phone_type).
DvSatellite.DrivingKeySourceField.Label=Driving key source field
DvSatellite.DrivingKeySourceField.ToolTip=Source column in the record source that supplies the driving key value. Renamed to the driving key column in the update pipeline and stored in the target satellite table.
DvSatellite.CheckResult.HasDrivingKeySourceField=Driving key source field: {0}
# SatelliteAttribute
SatelliteAttribute.Name.Label=Column name
SatelliteAttribute.Name.ToolTip=Physical column name in the satellite table.
SatelliteAttribute.Description.Label=Description
SatelliteAttribute.Description.ToolTip=Business meaning of the attribute.
SatelliteAttribute.DataType.Label=Data type
SatelliteAttribute.DataType.ToolTip=Logical / target data type (String, Integer, Date, Timestamp, Decimal, ...). Used for DDL generation.
SatelliteAttribute.Length.Label=Length
SatelliteAttribute.Length.ToolTip=Length or max length for the column.
SatelliteAttribute.Precision.Label=Precision
SatelliteAttribute.Precision.ToolTip=Decimal precision (for numeric types).
SatelliteAttribute.IncludeInChangeDataCapture.Label=Include in CDC
SatelliteAttribute.IncludeInChangeDataCapture.ToolTip=Include this column when capturing changes for the satellite (CDC). Usually true for all payload attributes. Set false for audit columns or columns added later that should not trigger new satellite versions.
