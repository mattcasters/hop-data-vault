#
# Data Vault 2.0 metadata plugin for Apache Hop
# English messages - metadata package
#

# Top level metadata types
DataVaultConfiguration.name=Data Vault Configuration
DataVaultConfiguration.description=Configuration for hashing algorithms, key data types, trimming, unknown records, naming conventions and other physical update strategy options for a Data Vault 2.0 model.

DvHub.name=Data Vault Hub
DvHub.description=A core business entity (Hub) in a Data Vault 2.0 model. Contains business key definition(s).

DvLink.name=Data Vault Link
DvLink.description=A relationship (Link) between Hubs in a Data Vault 2.0 model.

DvSatellite.name=Data Vault Satellite
DvSatellite.description=Time-variant descriptive attributes (Satellite) attached to a Hub or a Link.

DataVaultModel.name=Data Vault Model
DataVaultModel.description=A collection of Hubs, Links and Satellites that form (part of) a Data Vault 2.0 enterprise data warehouse.

# DataVaultConfiguration fields
DataVaultConfiguration.HashAlgorithm.Label=Hash algorithm
DataVaultConfiguration.HashAlgorithm.ToolTip=The hashing algorithm used to compute surrogate hash keys from business keys (and link combinations). MD5 is ubiquitous and fast. SHA-256 offers lower collision risk for very large data sets.
DataVaultConfiguration.HashKeyDataType.Label=Hash key data type
DataVaultConfiguration.HashKeyDataType.ToolTip=STRING stores the hex representation (easier debugging, more space). BINARY stores the raw hash bytes (recommended: half the storage, better performance, avoids collation problems).
DataVaultConfiguration.HashContentCasing.Label=Hash content casing
DataVaultConfiguration.HashContentCasing.ToolTip=Normalize the case of business key values before hashing to produce consistent keys. UPPER is the most common choice in Data Vault practice.
DataVaultConfiguration.BusinessKeyDelimiter.Label=Business key delimiter
DataVaultConfiguration.BusinessKeyDelimiter.ToolTip=String used to concatenate multiple business key parts (composite keys) and when building the input for link hash keys. Use a value unlikely to appear in your data (e.g. || or | or ~).
DataVaultConfiguration.NullPlaceholder.Label=Null placeholder
DataVaultConfiguration.NullPlaceholder.ToolTip=Value substituted for NULL or missing business key parts during hashing to ensure deterministic and platform-independent results.
DataVaultConfiguration.TrimBusinessKeys.Label=Trim business keys
DataVaultConfiguration.TrimBusinessKeys.ToolTip=Remove leading and trailing whitespace from business key values before hashing (highly recommended).
DataVaultConfiguration.GenerateUnknownRecord.Label=Generate unknown record
DataVaultConfiguration.GenerateUnknownRecord.ToolTip=Create a special "unknown" / "ghost" record in Hubs (and corresponding entries in Links) for missing or unmapped business keys.
DataVaultConfiguration.UnknownBusinessKeyValue.Label=Unknown business key value
DataVaultConfiguration.UnknownBusinessKeyValue.ToolTip=The business key value that represents "unknown" (used when generating the special unknown hash key record).
DataVaultConfiguration.HubHashKeySuffix.Label=Hub hash key suffix
DataVaultConfiguration.HubHashKeySuffix.ToolTip=Suffix appended to the hub name to form the hash key column (e.g. CUSTOMER + _HK => CUSTOMER_HK).
DataVaultConfiguration.LinkHashKeySuffix.Label=Link hash key suffix
DataVaultConfiguration.LinkHashKeySuffix.ToolTip=Suffix for the link hash key column.
DataVaultConfiguration.SatelliteHashDiffSuffix.Label=Satellite hashdiff suffix
DataVaultConfiguration.SatelliteHashDiffSuffix.ToolTip=Suffix used for the hashdiff column in satellites (used for efficient change detection).
DataVaultConfiguration.LoadDateField.Label=Load date field name
DataVaultConfiguration.LoadDateField.ToolTip=Standard column name for the load timestamp (or datetime) in all DV tables.
DataVaultConfiguration.LoadEndDateField.Label=Load end date field name
DataVaultConfiguration.LoadEndDateField.ToolTip=Column name for the load end date (used in some satellite loading patterns instead of or in addition to pure insert-only + hashdiff).
DataVaultConfiguration.RecordSource.Field.Label=Record source field name
DataVaultConfiguration.RecordSourceField.ToolTip=Column that identifies the original source system / feed that produced the record.
DataVaultConfiguration.SourceField.Label=Source field name
DataVaultConfiguration.SourceField.ToolTip=Optional additional source identifier column.
DataVaultConfiguration.UseHashDiff.Label=Use hashdiff for satellites
DataVaultConfiguration.UseHashDiff.ToolTip=Calculate and store a hash of the satellite payload attributes. Used to detect changes efficiently (classic DV 2.0 pattern).
DataVaultConfiguration.UseLoadEndDate.Label=Use load end date pattern
DataVaultConfiguration.UseLoadEndDate.ToolTip=Use an end-dating / current flag pattern in satellites (some teams prefer this over pure hashdiff insert-only).

DataVaultConfigurationEditor.Name.Label=Data Vault Configuration name

# DvHub
DvHub.TableName.Label=Physical table name
DvHub.TableName.ToolTip=The actual table name to be created/used in the target database (can differ from the logical metadata name).
DvHub.Description.Label=Description
DvHub.Description.ToolTip=Business description of this hub.
DvHub.RecordSource.Label=Default record source
DvHub.RecordSource.ToolTip=Default value for the record source column when loading this hub (can be overridden at load time).
DvHub.BusinessKeys.Label=Business keys
DvHub.BusinessKeys.ToolTip=One or more business key columns that uniquely identify instances of this business concept. Order is significant for composite key hashing.
DvHub.Configuration.Label=Configuration
DvHub.Configuration.ToolTip=Specific Data Vault configuration to use for hashing and naming when loading this hub (optional).

# DvLink
DvLink.TableName.Label=Physical table name
DvLink.TableName.ToolTip=The actual table name for the link.
DvLink.Description.Label=Description
DvLink.Description.ToolTip=Description of the relationship this link represents.
DvLink.RecordSource.Label=Default record source
DvLink.RecordSource.ToolTip=Default record source for this link.
DvLink.HubNames.Label=Participating hubs
DvLink.HubNames.ToolTip=List of hub metadata names that participate in this relationship. The link hash key is derived from the hash keys of these hubs (plus driving keys if any).
DvLink.DrivingKeyNames.Label=Driving keys
DvLink.DrivingKeyNames.ToolTip=When the same hub participates multiple times, list the driving key column names that differentiate the roles (e.g. FROM_LOCATION_HK vs TO_LOCATION_HK).
DvLink.Configuration.Label=Configuration
DvLink.Configuration.ToolTip=Specific configuration for this link.
DvLink.HasDescriptiveAttributes.Label=Has descriptive attributes (link satellite)
DvLink.HasDescriptiveAttributes.ToolTip=Check if relationship attributes exist that should be historized in a satellite attached to this link.

# DvSatellite
DvSatellite.TableName.Label=Physical table name
DvSatellite.TableName.ToolTip=The actual table name for the satellite.
DvSatellite.Description.Label=Description
DvSatellite.Description.ToolTip=Description of the satellite attributes.
DvSatellite.RecordSource.Label=Default record source
DvSatellite.RecordSource.ToolTip=Default record source.
DvSatellite.HubName.Label=Parent hub
DvSatellite.HubName.ToolTip=Select the hub this satellite is attached to (for hub satellites).
DvSatellite.LinkName.Label=Parent link
DvSatellite.LinkName.ToolTip=Select the link this satellite is attached to (for link satellites). Leave hub empty when using a link.
DvSatellite.Attributes.Label=Attributes
DvSatellite.Attributes.ToolTip=The descriptive columns historized in this satellite.
DvSatellite.Configuration.Label=Configuration
DvSatellite.Configuration.ToolTip=Specific configuration (especially hashdiff and naming).
DvSatellite.MultiActive.Label=Multi-active satellite
DvSatellite.MultiActive.ToolTip=Check for multi-active satellites (multiple active records for the same parent key at the same point in time, differentiated by a driving key).
DvSatellite.DrivingKey.Label=Driving key column
DvSatellite.DrivingKey.ToolTip=For multi-active satellites: the column that makes the record unique together with the parent hash key and load date.

# SatelliteAttribute
SatelliteAttribute.Name.Label=Column name
SatelliteAttribute.Name.ToolTip=Physical column name in the satellite table.
SatelliteAttribute.Description.Label=Description
SatelliteAttribute.Description.ToolTip=Business meaning of the attribute.
SatelliteAttribute.DataType.Label=Data type
SatelliteAttribute.DataType.ToolTip=Logical / target data type (String, Integer, Date, Timestamp, Decimal, ...). Used for DDL generation.
SatelliteAttribute.Length.Label=Length
SatelliteAttribute.Length.ToolTip=Length or max length for the column.
SatelliteAttribute.Precision.Label=Precision
SatelliteAttribute.Precision.ToolTip=Decimal precision (for numeric types).
SatelliteAttribute.IncludeInHashDiff.Label=Include in hashdiff
SatelliteAttribute.IncludeInHashDiff.ToolTip=Include this column when calculating the satellite hashdiff. Usually true for all payload attributes. Set false for audit columns or columns added later that should not trigger re-hashing of history.

# BusinessKey
BusinessKey.Name.Label=Business key name
BusinessKey.Name.ToolTip=Name of the business key column (e.g. CUSTOMER_ID or a composite part name).
BusinessKey.Description.Label=Description
BusinessKey.Description.ToolTip=Business meaning of this key.
BusinessKey.DataType.Label=Data type
BusinessKey.DataType.ToolTip=Data type of the source business key (helps with casting/normalization before hashing).
BusinessKey.Length.Label=Length
BusinessKey.Length.ToolTip=Length of the business key column.

# DataVaultModel
DataVaultModel.Description.Label=Description
DataVaultModel.Description.ToolTip=High-level description or purpose of this Data Vault model / subject area.
DataVaultModel.Configuration.Label=Default configuration
DataVaultModel.Configuration.ToolTip=The default Data Vault configuration (hashing, naming, ...) used for objects in this model.
DataVaultModel.Hubs.Label=Hubs
DataVaultModel.Hubs.ToolTip=The Hubs that are part of this model.
DataVaultModel.Links.Label=Links
DataVaultModel.Links.ToolTip=The Links (relationships) that are part of this model.
DataVaultModel.Satellites.Label=Satellites
DataVaultModel.Satellites.ToolTip=The Satellites that are part of this model.

DataVaultModel.Tables.Label=Tables
DataVaultModel.Tables.ToolTip=All Data Vault tables (Hubs, Links and Satellites) that belong to this model. Each entry knows its type (HUB / SATELLITE / LINK) via the table definition.

# DvTableBase (common to Hub / Link / Satellite)
DvTableBase.TableName.Label=Physical table name
DvTableBase.TableName.ToolTip=The actual table name to be created/used in the target database (can differ from the logical metadata name).
DvTableBase.Description.Label=Description
DvTableBase.Description.ToolTip=Business description of this Data Vault table.
DvTableBase.RecordSource.Label=Default record source
DvTableBase.RecordSource.ToolTip=Default value for the record source column when loading rows into this table (can be overridden at load time).
