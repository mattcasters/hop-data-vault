# DataVaultModel
DataVaultModel.Description.Label=Description
DataVaultModel.Description.ToolTip=High-level description or purpose of this Data Vault model / subject area.

DataVaultModel.Hubs.Label=Hubs
DataVaultModel.Hubs.ToolTip=The Hubs that are part of this model.
DataVaultModel.Links.Label=Links
DataVaultModel.Links.ToolTip=The Links (relationships) that are part of this model.
DataVaultModel.Satellites.Label=Satellites
DataVaultModel.Satellites.ToolTip=The Satellites that are part of this model.
DataVaultModel.Tables.Label=Tables
DataVaultModel.Tables.ToolTip=All Data Vault tables (Hubs, Links and Satellites) that belong to this model. Each entry knows its type (HUB / SATELLITE / LINK) via the table definition.
DataVaultModel.Sources.Label=Sources
DataVaultModel.Sources.ToolTip=Source systems feeding this model (e.g. Database connections). Each source defines the expected input row layout (fields + primary key info).
# DataVaultSource
DataVaultSource.SourceIndicatorField.Label=Source indicator field
DataVaultSource.SourceIndicatorField.ToolTip=Optional name of a column in the referenced source table that contains the per-row source system indicator (record source) value. Only used when no static source indicator value is specified.
DataVaultSource.SourceIndicator.Label=Source indicator
DataVaultSource.SourceIndicator.ToolTip=Static source system indicator / record source value (e.g. 'ERP', 'CRM' or a source system code) to use for rows from this source. If specified, this static value takes precedence over any source indicator field. Variables are supported.
DataVaultSource.Group.Label=Group
DataVaultSource.Group.ToolTip=Optional group label for partial updates (e.g. hourly, daily). Used by the Data Vault Update workflow action to select which record sources to process in a run.
# DvTableBase (common to Hub / Link / Satellite)
DvTableBase.TableName.Label=Physical table name
DvTableBase.TableName.ToolTip=The actual table name to be created/used in the target database (can differ from the logical metadata name).
DvTableBase.Description.Label=Description
DvTableBase.Description.ToolTip=Business description of this Data Vault table.
DvTableBase.RecordSource.Label=Default record source
DvTableBase.RecordSource.ToolTip=Data Vault Source (by name) providing the default value for the record source column when loading rows into this table (can be overridden at load time).
