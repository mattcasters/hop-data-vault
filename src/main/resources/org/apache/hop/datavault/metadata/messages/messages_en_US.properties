DvLink.CheckResult.HasDescriptiveAttributes=This link has descriptive attributes (a link satellite is expected).
DvLink.CheckResult.HasLinkSatellites=This link has {0} participating link satellite(s).
DvLink.CheckResult.HasLinkHubSources=Has {0} hub record source(s) defined for this link.
DvLink.CheckResult.HasLinkSatelliteSources=Has {0} link satellite record source(s) defined for this link.
