#
# Data Vault 2.0 metadata plugin for Apache Hop
# English messages - metadata package
#
# Data Vault Sources
DvDatabaseSource.name=Data Vault Source (Database)
DvDatabaseSource.description=A source system that reads rows from a relational database (table, view or query) using a registered RDBMS connection (DatabaseMeta).

# DvDatabaseSource (and common source base)
DvDatabaseSource.DatabaseName.Label=Database connection
DvDatabaseSource.DatabaseName.ToolTip=Name of the registered RDBMS connection (DatabaseMeta) to read data from.
DvDatabaseSource.SchemaName.Label=Schema
DvDatabaseSource.SchemaName.ToolTip=Optional schema name to qualify tables in the source database.
DvDatabaseSource.TableName.Label=Source table / view
DvDatabaseSource.TableName.ToolTip=Optional physical table or view name in the source system (a load process may also receive this at runtime or execute a custom query).
DvSourceBase.Description.Label=Description
DvSourceBase.Description.ToolTip=Description of this source system or data feed.

# DvDatabaseSourceEditor (custom metadata editor)
DvDatabaseSourceEditor.Name.Label=Name
DvDatabaseSourceEditor.Name.ToolTip=The name of this Data Vault source definition.
DvDatabaseSourceEditor.Description.Label=Description
DvDatabaseSourceEditor.Description.ToolTip=Description of this source system / data feed.
DvDatabaseSourceEditor.DatabaseName.Label=Database connection
DvDatabaseSourceEditor.DatabaseName.ToolTip=Name of the RDBMS connection (DatabaseMeta) metadata object to read from.
DvDatabaseSourceEditor.SchemaName.Label=Schema
DvDatabaseSourceEditor.SchemaName.ToolTip=Optional schema name qualifying the source table.
DvDatabaseSourceEditor.TableName.Label=Source table/view
DvDatabaseSourceEditor.TableName.ToolTip=Optional name of the source table or view (may be supplied at runtime instead).
DvDatabaseSourceEditor.Fields.Label=Fields (row layout)
DvDatabaseSourceEditor.Fields.ToolTip=Define the expected columns coming from this source, including which form the natural/primary key on the source side.

DvDatabaseSourceEditor.Import.Button=Import
DvDatabaseSourceEditor.ImportTables.Button=Import Tables

ImportDatabaseTablesOptionsDialog.Shell.Title=Import database tables
ImportDatabaseTablesOptionsDialog.DatabaseName.Label=Database connection
ImportDatabaseTablesOptionsDialog.DatabaseName.ToolTip=Select the RDBMS connection to read table metadata from.
ImportDatabaseTablesOptionsDialog.SchemaName.Label=Schema
ImportDatabaseTablesOptionsDialog.SchemaName.ToolTip=Optional schema name to list tables from.
ImportDatabaseTablesOptionsDialog.DatabaseSourcePrefix.Label=Database source name prefix
ImportDatabaseTablesOptionsDialog.DatabaseSourcePrefix.ToolTip=Optional prefix for the name of each Data Vault Source (Database) metadata object. When empty, names default to connection-table.
ImportDatabaseTablesOptionsDialog.CreateDataVaultSource.Label=Create Data Vault Source as well
ImportDatabaseTablesOptionsDialog.DataVaultSourcePrefix.Label=Data Vault Source name prefix
ImportDatabaseTablesOptionsDialog.DataVaultSourcePrefix.ToolTip=Optional prefix for the name of each Data Vault Source metadata object created alongside the database source.

DvDatabaseSourceEditor.ImportTables.Selection.Title=Select tables to import
DvDatabaseSourceEditor.ImportTables.Selection.Message=Review the tables to import and adjust the database source metadata names if needed.
DvDatabaseSourceEditor.ImportTables.Selection.Message.WithDataVaultSource=Review the tables to import and adjust the database source and Data Vault Source metadata names if needed.
DvDatabaseSourceEditor.ImportTables.Column.TableName=Table name
DvDatabaseSourceEditor.ImportTables.Column.DatabaseSourceName=Database source name
DvDatabaseSourceEditor.ImportTables.Column.DataVaultSourceName=Data Vault Source name

DvDatabaseSourceEditor.ErrorListingTables.DialogTitle=Error
DvDatabaseSourceEditor.ErrorListingTables.DialogMessage=An error occurred while listing tables in the selected database schema.

DvDatabaseSourceEditor.NoTablesFound.DialogTitle=No tables
DvDatabaseSourceEditor.NoTablesFound.DialogMessage=No tables were found for the selected database connection and schema.

DvDatabaseSourceEditor.ErrorImportingTables.DialogTitle=Error
DvDatabaseSourceEditor.ErrorImportingTables.DialogMessage=An error occurred while importing database tables.

DvDatabaseSourceEditor.ErrorRefreshingTree.DialogTitle=Error
DvDatabaseSourceEditor.ErrorRefreshingTree.DialogMessage=The tables were imported but the metadata tree could not be refreshed.

DvDatabaseSourceEditor.ImportTables.Exists.Message=Metadata object ''{0}'' already exists. Skipping table ''{1}''.
DvDatabaseSourceEditor.ImportTables.DataVaultSourceExists.Message=Data Vault Source ''{0}'' already exists. Database source was created for table ''{1}''.
DvDatabaseSourceEditor.ImportTables.TableError.Message=Failed to import table ''{0}'': {1}
DvDatabaseSourceEditor.ImportTables.PartialFailure.Title=Import completed with errors
DvDatabaseSourceEditor.ImportTables.PartialFailure.Message=Imported {0} table(s).{1}{1}{2}
DvDatabaseSourceEditor.ImportTables.Success.Title=Import complete
DvDatabaseSourceEditor.ImportTables.Success.Message=Successfully imported {0} table(s).

DvDatabaseSourceEditor.NoConnection.DialogTitle=Error
DvDatabaseSourceEditor.NoConnection.DialogMessage=Please select or enter a database connection name before importing fields from a table.

DvDatabaseSourceEditor.ErrorLoadingConnection.DialogTitle=Error
DvDatabaseSourceEditor.ErrorLoadingConnection.DialogMessage=Error loading the database connection '{0}'.

DvDatabaseSourceEditor.ErrorImportingFields.DialogTitle=Error
DvDatabaseSourceEditor.ErrorImportingFields.DialogMessage=An error occurred while trying to import the fields from the selected database table.

# SourceField (common row layout definition used by all source types)
SourceField.Name.Label=Field name
SourceField.Name.ToolTip=Name of the column as it appears in the source (before any renaming in the load process).
SourceField.Description.Label=Description
SourceField.Description.ToolTip=Optional business meaning of this source column.
SourceField.SourceDataType.Label=Source data type
SourceField.SourceDataType.ToolTip=Data type as declared in the source system (e.g. VARCHAR, NUMBER, DATE, ...). Used for documentation, casting rules and initial DDL suggestions.
SourceField.Length.Label=Length
SourceField.Length.ToolTip=Length (or max length) of the source column.
SourceField.Precision.Label=Precision
SourceField.Precision.ToolTip=Decimal precision for numeric source columns.
SourceField.PrimaryKey.Label=Part of source primary key
SourceField.PrimaryKey.ToolTip=Check if this field participates in the natural / primary key of the source table (used to determine driving keys, deduplication, etc.).
SourceField.HopType.Label=Hop Type
SourceField.HopType.ToolTip=The internal Hop data type code (integer) for this source field. This is used to construct the correct ValueMeta type when reading/writing data (annotated with ValueMetaBase.ValueTypeCodeConverter for serialization).
