# Shared target-loading settings (referenced from BusinessVaultConfiguration via i18n::DataVaultConfiguration.*)
DataVaultConfiguration.TargetTableBatchSize.Label=Target table batch size
DataVaultConfiguration.TargetTableBatchSize.ToolTip=Number of rows to buffer before committing inserts to the target database in generated Table Output transforms (commit size). Supports variables. Default 1000 if empty.
DataVaultConfiguration.TargetTableParallelCopies.Label=Target table parallel copies
DataVaultConfiguration.TargetTableParallelCopies.ToolTip=Number of parallel copies for generated Table Output transforms writing to target warehouse tables. In staging-file bulk mode, parallel copies write separate shard files using '${Internal.Transform.CopyNr}'. Supports variables. Default 1 if empty.
DataVaultConfiguration.TargetLoadMode.Label=Target load mode
DataVaultConfiguration.TargetLoadMode.ToolTip=How new rows are written to target tables in generated update pipelines. Table Output (default) uses JDBC inserts. Native bulk loader uses the matching Hop bulk loader transform when installed. Staging file mode writes CSV shards and runs a bulk-load workflow.
DataVaultConfiguration.BulkLoadStagingFolder.Label=Bulk load staging folder
DataVaultConfiguration.BulkLoadStagingFolder.ToolTip=Folder for delimited staging files when target load mode is Staging file. Supports variables. Defaults to '${java.io.tmpdir}/dv2/bulk/' when empty.
DataVaultConfiguration.BulkLoadDelimiter.Label=Bulk load delimiter
DataVaultConfiguration.BulkLoadDelimiter.ToolTip=Field delimiter for staged bulk load files and generated bulk commands. Default comma.
DataVaultConfiguration.BulkLoadEnclosure.Label=Bulk load enclosure
DataVaultConfiguration.BulkLoadEnclosure.ToolTip=Optional field enclosure for staged bulk load files. Default double quote.
DataVaultConfiguration.BulkLoadEncoding.Label=Bulk load encoding
DataVaultConfiguration.BulkLoadEncoding.ToolTip=Character encoding for staged bulk load files. Default UTF-8.
DataVaultConfiguration.BulkLoadLocalFileRequired.Label=Bulk load requires local file
DataVaultConfiguration.BulkLoadLocalFileRequired.ToolTip=When enabled, generated bulk load workflows expect staging files on the local filesystem (required for MySQL LOAD DATA LOCAL INFILE).

DataVaultConfiguration.GeneratedPipelineFolder.Label=Generated artifact folder
DataVaultConfiguration.GeneratedPipelineFolder.ToolTip=When set, generated Business Vault update pipelines (.hpl) and bulk-load master workflows (.hwf) are saved in this folder before execution. Supports variables (e.g. '${PROJECT_HOME}/generated-pipelines'). Leave empty to run in memory only.
DataVaultConfiguration.GeneratedWorkflowNamePrefix.Label=Bulk workflow name prefix
DataVaultConfiguration.GeneratedWorkflowNamePrefix.ToolTip=Prefix for the master bulk-load workflow name when target load mode is Staging file. The full name is prefix + model name. Supports variables. Default: BV Bulk Update -

