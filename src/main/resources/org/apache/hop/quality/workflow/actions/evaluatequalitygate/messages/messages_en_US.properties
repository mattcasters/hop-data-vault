ActionEvaluateQualityGate.Name=Evaluate quality gate
ActionEvaluateQualityGate.Description=Apply a disposition policy to a data quality report (fail, warn, or alert-only)
ActionEvaluateQualityGate.Keywords=data quality gate fail alert disposition
ActionEvaluateQualityGate.Title=Evaluate quality gate
ActionEvaluateQualityGate.DispositionMode.Label=Disposition mode
ActionEvaluateQualityGate.DispositionMode.ToolTip=FAIL_ON_BLOCKING, FAIL_ON_WARNINGS, or ALERT_ONLY
ActionEvaluateQualityGate.Remeasure.Label=Re-measure if no prior report
ActionEvaluateQualityGate.Remeasure.ToolTip=When no Measure Data Quality report is found in this run, measure again using the scope fields below. Retail gates that immediately follow Measure should set this to N (remeasureIfNoPriorReport=N) so lifecycle/labels stay correct and gate remeasure does not re-run measure.
ActionEvaluateQualityGate.CatalogConnection.Label=Data catalog connection
ActionEvaluateQualityGate.CatalogConnection.ToolTip=Catalog connection for re-measure scope
ActionEvaluateQualityGate.Group.Label=Resource definition group
ActionEvaluateQualityGate.Group.ToolTip=Optional re-measure scope: resource definition group
ActionEvaluateQualityGate.RecordKeys.Label=Record definition keys
ActionEvaluateQualityGate.RecordKeys.ToolTip=Optional re-measure scope: namespace/name keys
ActionEvaluateQualityGate.NamespacePrefix.Label=Namespace prefix
ActionEvaluateQualityGate.NamespacePrefix.ToolTip=Optional re-measure scope: namespace prefix
ActionEvaluateQualityGate.AlertSinks.Label=Alert sinks
ActionEvaluateQualityGate.AlertSinks.ToolTip=Comma-separated sink ids (log, ops_table). Blank defaults to log. ALERT_ONLY with findings publishes to all listed sinks; fail modes log when listed and ops_table only when listed and Alert on gate failure is enabled
ActionEvaluateQualityGate.AlertOnGateFailure.Label=Alert on gate failure
ActionEvaluateQualityGate.AlertOnGateFailure.ToolTip=When enabled, fail dispositions with findings also publish to ops_table if it is listed in Alert sinks (default off)
ActionEvaluateQualityGate.HistoryDatabase.Label=History database
ActionEvaluateQualityGate.HistoryDatabase.ToolTip=Ops connection for ops_table alert sink (retail: OPS). Empty uses QUALITY_HISTORY_DATABASE
ActionEvaluateQualityGate.HistorySchema.Label=History schema
ActionEvaluateQualityGate.HistorySchema.ToolTip=Schema for quality history / quality_alert tables (default dv_ops)
ActionEvaluateQualityGate.AutoCreateHistoryTables.Label=Auto-create history tables
ActionEvaluateQualityGate.AutoCreateHistoryTables.ToolTip=Create quality history tables (including quality_alert) when missing, used by ops_table sink
ActionEvaluateQualityGate.Error.NoReport=No data quality report available; run Measure Data Quality first or enable re-measure
ActionEvaluateQualityGate.Error.MissingCatalog=Data catalog connection is required when using keys or namespace prefix for re-measure
