ActionMeasureDataQuality.Name=Measure data quality
ActionMeasureDataQuality.Description=Run data quality rules against catalog subjects and produce an ephemeral report (does not fail on findings)
ActionMeasureDataQuality.Keywords=data quality measure profile catalog gate
ActionMeasureDataQuality.Title=Measure data quality
ActionMeasureDataQuality.CatalogConnection.Label=Data catalog connection
ActionMeasureDataQuality.CatalogConnection.ToolTip=Catalog connection used to load record definitions
ActionMeasureDataQuality.Group.Label=Resource definition group
ActionMeasureDataQuality.Group.ToolTip=Optional: measure sources referenced by this resource definition group
ActionMeasureDataQuality.RecordKeys.Label=Record definition keys
ActionMeasureDataQuality.RecordKeys.ToolTip=Optional comma-separated namespace/name keys to measure
ActionMeasureDataQuality.NamespacePrefix.Label=Namespace prefix
ActionMeasureDataQuality.NamespacePrefix.ToolTip=Optional catalog namespace prefix to measure all matching records
ActionMeasureDataQuality.EvaluationMode.Label=Evaluation mode
ActionMeasureDataQuality.EvaluationMode.ToolTip=AUTO, SAMPLE, FULL_SCAN, or SQL_PUSHDOWN
ActionMeasureDataQuality.Lifecycle.Label=Lifecycle
ActionMeasureDataQuality.Lifecycle.ToolTip=PRE_UPDATE, POST_UPDATE, or AD_HOC
ActionMeasureDataQuality.SampleLimit.Label=Sample row limit
ActionMeasureDataQuality.SampleLimit.ToolTip=Row limit when sampling (Phase 1 databases use SQL pushdown)
ActionMeasureDataQuality.PersistHistory.Label=Persist quality history
ActionMeasureDataQuality.PersistHistory.ToolTip=When enabled, write quality_run, profile snapshots, and findings to ops tables (default off)
ActionMeasureDataQuality.HistoryDatabase.Label=History database
ActionMeasureDataQuality.HistoryDatabase.ToolTip=Ops connection for quality history (retail: OPS). Empty uses QUALITY_HISTORY_DATABASE or first subject physical DB
ActionMeasureDataQuality.HistorySchema.Label=History schema
ActionMeasureDataQuality.HistorySchema.ToolTip=Schema for quality history tables (default dv_ops)
ActionMeasureDataQuality.LoadId.Label=Load id
ActionMeasureDataQuality.LoadId.ToolTip=Correlation id stored on quality_run (default ${DV_WORKFLOW_EXECUTION_ID})
ActionMeasureDataQuality.AutoCreateTables.Label=Auto-create history tables
ActionMeasureDataQuality.AutoCreateTables.ToolTip=Create quality_run / profile / finding / quality_alert tables when missing
ActionMeasureDataQuality.PublishCatalogDefinitions.Label=Publish catalog definitions
ActionMeasureDataQuality.PublishCatalogDefinitions.ToolTip=Upsert operations RecordDefinitions for quality history tables when a catalog connection is set
ActionMeasureDataQuality.FailOnPersistError.Label=Fail on persist error
ActionMeasureDataQuality.FailOnPersistError.ToolTip=When enabled, measure fails if quality history publish fails (default off — log only)
ActionMeasureDataQuality.Error.NoSubjects=No catalog subjects resolved for data quality measure
ActionMeasureDataQuality.Error.MissingCatalog=Data catalog connection is required when using keys or namespace prefix
ActionMeasureDataQuality.Error.InfraErrors=Data quality measure failed with infrastructure errors
ActionMeasureDataQuality.Error.NoHistoryDatabase=No quality history database resolved (set History database, QUALITY_HISTORY_DATABASE, or subject physical table)
ActionMeasureDataQuality.Error.PersistFailed=Failed to persist quality history: {0}
ActionMeasureDataQuality.Info.Complete=Measured data quality: {0} finding(s) across {1} subject(s)
ActionMeasureDataQuality.Info.HistoryDatabaseResolved=Quality history database resolved to ''{0}''
ActionMeasureDataQuality.Info.PersistResult=Quality history publish {0}: {1}
