services:
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    networks:
      hop-test:
        aliases:
          - warehouse.minio
    ports:
      - "9000:9000"
      - "9001:9001"
    command: ["server", "/data", "--console-address", ":9001"]

  mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    networks:
      - hop-test
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin password) do echo 'waiting for minio...' && sleep 1; done;
      /usr/bin/mc rm -r --force minio/warehouse || true;
      /usr/bin/mc mb minio/warehouse;
      /usr/bin/mc anonymous set public minio/warehouse;
      echo 'MinIO warehouse bucket ready';
      tail -f /dev/null
      "

  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    depends_on:
      mc:
        condition: service_started
    networks:
      - hop-test
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000

  seed:
    build:
      context: iceberg-seed
    depends_on:
      iceberg-rest:
        condition: service_started
    environment:
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
      ICEBERG_NAMESPACE: crm
      ICEBERG_TABLE: customer
      PARQUET_SOURCE_DIR: /data/parquet
      PARQUET_INCLUDE_MASK: customer_load1.parquet
      SEED_RESET: "true"
    volumes:
      - ../files/parquet-basic:/data/parquet:ro
    networks:
      - hop-test

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - hop-test

  hop:
    build:
      context: ../..
      dockerfile: scripts/docker/Dockerfile
    image: docker-hop:latest
    user: root
    depends_on:
      db:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: hop-data-vault
      HOP_PROJECT_FOLDER: /workspace/integration-tests
      HOP_FILE_PATH: /workspace/integration-tests/tests/iceberg-basic/update-vault1-iceberg.hwf
      HOP_RUN_CONFIG: local
      HOP_RUN_PARAMETERS: METRICS_FOLDER=${METRICS_FOLDER:-/workspace/integration-tests/metrics/iceberg}
      HOP_ENVIRONMENT_NAME: test-iceberg
      HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS: /workspace/integration-tests/environments/docker-iceberg.json
      HOP_CUSTOM_ENTRYPOINT_EXTENSION_SHELL_FILE_PATH: /opt/hop-datavault/entrypoint-prepare.sh
      DB_TYPE: postgres
      HOST_UID: ${HOST_UID:-0}
      HOST_GID: ${HOST_GID:-0}
      ICEBERG_CATALOG_URI: http://iceberg-rest:8181
      ICEBERG_WAREHOUSE: s3://warehouse/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
      ICEBERG_NAMESPACE: crm
      ICEBERG_TABLE: customer
    volumes:
      - ../../:/workspace
    networks:
      - hop-test

networks:
  hop-test: