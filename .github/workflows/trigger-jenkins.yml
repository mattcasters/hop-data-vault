name: Trigger Jenkins build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # manual run from Actions tab

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins job
        env:
          JENKINS_URL: ${{ secrets.JENKINS_URL }}
          JENKINS_USER: ${{ secrets.JENKINS_USER }}
          JENKINS_TOKEN: ${{ secrets.JENKINS_TOKEN }}
          JENKINS_JOB: ${{ secrets.JENKINS_JOB }}
          JENKINS_BUILD_TOKEN: ${{ secrets.JENKINS_BUILD_TOKEN }}
        run: |
          set -euo pipefail

          # Job path: "folder/job" -> "job/folder/job/job"
          JOB_PATH=$(echo "$JENKINS_JOB" | sed 's#/#/job/#g')

          # CSRF crumb (required on most Jenkins installs)
          CRUMB_JSON=$(curl -fsS -u "$JENKINS_USER:$JENKINS_TOKEN" \
            "$JENKINS_URL/crumbIssuer/api/json")
          CRUMB=$(echo "$CRUMB_JSON" | jq -r .crumb)
          CRUMB_FIELD=$(echo "$CRUMB_JSON" | jq -r .crumbRequestField)

          # Queue the build; pass git ref if the job uses parameters
          HTTP=$(curl -sS -o /tmp/jenkins-body -w "%{http_code}" \
            -X POST \
            -u "$JENKINS_USER:$JENKINS_TOKEN" \
            -H "$CRUMB_FIELD: $CRUMB" \
            --data-urlencode "token=$JENKINS_BUILD_TOKEN" \
            "$JENKINS_URL/job/$JOB_PATH/build")

          echo "Jenkins responded HTTP $HTTP"
          cat /tmp/jenkins-body || true
          # 201 = queued; some setups return 200
          test "$HTTP" = "201" -o "$HTTP" = "200"

