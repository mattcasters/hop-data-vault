         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="398" stroke="none">This SCD2 exercise uses the input from 4 different satellites to build </text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="409" stroke="none">one "Customer 360" Type II Slowly Changing Dimension.</text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="420" stroke="none"></text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="431" stroke="none">The way it does this is by reading from all 4 sources at the same time and </text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="442" stroke="none">using a Sorted Schema Merge (new transform) feeding into the </text>
         <text fill="rgb(35,35,35)" x="443" xml:space="preserve" y="442" stroke="none">Repeat Fields</text>
         <line y2="443" fill="none" x1="443" x2="503" stroke="rgb(35,35,35)" y1="443"/>
         <text fill="rgb(35,35,35)" x="503" xml:space="preserve" y="442" stroke="none"> transform </text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="453" stroke="none"></text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="464" stroke="none">to build combined records of what is essentially a timeline per customer hash key.  </text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="475" stroke="none">What you get is a clear indication of which record version was valid at which point in time.</text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="486" stroke="none"></text>
         <text fill="rgb(35,35,35)" x="169" xml:space="preserve" y="497" stroke="none">Click on the </text>
         <text fill="rgb(35,35,35)" x="222" xml:space="preserve" y="497" stroke="none">customer_360_bv</text>
         <line y2="498" fill="none" x1="222" x2="299" stroke="rgb(35,35,35)" y1="498"/>
         <text fill="rgb(35,35,35)" x="299" xml:space="preserve" y="497" stroke="none"> table and select "Show build pipeline" to see the full pipeline.</text>
