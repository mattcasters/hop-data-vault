# Short-lived Hop container for hop svg (repo root mounted at /workspace).
# Build uses the same Dockerfile as compose.hop.yml (apache/hop + hop-datavault plugin).
services:
  hop:
    build:
      context: ../..
      dockerfile: project/docker/Dockerfile
      args:
        HOP_IMAGE_VERSION: ${HOP_IMAGE_VERSION:-2.18.1}
    image: docker-hop:latest
    user: root
    network_mode: host
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: hop-data-vault
      HOP_PROJECT_FOLDER: /workspace/project
      HOP_RUN_CONFIG: local
      HOST_UID: ${HOST_UID:-0}
      HOST_GID: ${HOST_GID:-0}
    volumes:
      - ../../:/workspace