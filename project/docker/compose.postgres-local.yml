services:
  db:
    image: postgres:16
    container_name: hop-data-vault-postgres-local
    command: ["postgres", "-c", "port=54320"]
    ports:
      - "54320:54320"
    environment:
      POSTGRES_USER: ${DB_USER:-test}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test}
      POSTGRES_DB: ${DB_NAME:-test}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -p 54320"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - hop-data-vault-postgres-local-data:/var/lib/postgresql/data

volumes:
  hop-data-vault-postgres-local-data: