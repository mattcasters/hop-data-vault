services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: test
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ptest", "-utest"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - hop-test

  hop:
    build:
      context: ../..
      dockerfile: project/docker/Dockerfile
    image: docker-hop:latest
    user: root
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: hop-data-vault
      HOP_PROJECT_FOLDER: /project
      HOP_FILE_PATH: /project/tests/run-tests.hwf
      HOP_RUN_CONFIG: local
      HOP_RUN_PARAMETERS: METRICS_FOLDER=${METRICS_FOLDER:-/project/metrics/${DB_TYPE}}
      HOP_ENVIRONMENT_NAME: test-db
      HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS: /project/environments/docker-mysql.json
      HOP_CUSTOM_ENTRYPOINT_EXTENSION_SHELL_FILE_PATH: /opt/hop-datavault/entrypoint-prepare.sh
      DB_TYPE: mysql
      HOST_UID: ${HOST_UID:-0}
      HOST_GID: ${HOST_GID:-0}
    volumes:
      - ../:/project
    networks:
      - hop-test

networks:
  hop-test: